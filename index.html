<script>
const bushby97 = [
    { sex: "Male", min: 170, max: 179, cutoff: 62.3 },
    { sex: "Male", min: 180, max: 189, cutoff: 62.8 },
    { sex: "Female", min: 170, max: 179, cutoff: 60.9 }
];

function checkMacrocephaly() {
    const sex = document.getElementById("sex").value;
    const height = parseFloat(document.getElementById("height").value);
    const hc = parseFloat(document.getElementById("hc").value);

    document.getElementById("reportOutput").innerText = "";

    if (!sex || isNaN(height) || isNaN(hc)) {
        document.getElementById("result").innerHTML =
            "<span class='warn'>Please complete all fields.</span>";
        return;
    }

    const ref = bushby97.find(r =>
        r.sex === sex && height >= r.min && height <= r.max
    );

    if (!ref) {
        document.getElementById("result").innerHTML =
            "<span class='warn'>No Bushby reference available for this sex/height combination.</span>";
        return;
    }

    const cutoff = ref.cutoff;

    if (hc >= cutoff) {
        document.getElementById("result").innerHTML =
            `<span class='yes'>YES — Macrocephaly (≥97th centile)</span><br>
             97th centile cutoff used: <strong>${cutoff} cm</strong>`;
        document.getElementById("reportOutput").innerText =
            "Adult head circumference is ≥97th centile for sex and height (macrocephaly).";
    } else {
        document.getElementById("result").innerHTML =
            `<span class='no'>NO — Below 97th centile</span><br>
             97th centile cutoff used: <strong>${cutoff} cm</strong>`;
        document.getElementById("reportOutput").innerText =
            "Adult head circumference is <97th centile for sex and height.";
    }
}
</script>
