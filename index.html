<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Macrocephaly Screening Tool</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }
        button {
            padding: 10px;
            width: 100%;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.1em;
        }
        .yes { color: green; }
        .no { color: red; }
        .warn { color: #b36b00; }
        .disclaimer {
            margin-top: 30px;
            font-size: 0.9em;
            color: #555;
            border-top: 1px solid #ccc;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<h2>Macrocephaly Screening Tool</h2>

<label>Sex:</label>
<select id="sex">
    <option value="">Select...</option>
    <option value="Male">Male</option>
    <option value="Female">Female</option>
</select>

<label>Height (cm):</label>
<input type="number" id="height" min="100" max="220">

<label>Head circumference (cm):</label>
<input type="number" id="hc" step="0.1">

<button onclick="checkMacrocephaly()">Check</button>

<div id="result"></div>

<div class="disclaimer">
⚠️ This tool is a screening aid only and must be used alongside clinical judgement and the National Test Directory.  
Based on Bushby et al., 1992.  
</div>

<script>
    
function calculate97thCentile(sex, height) {
    const heightCoeff = 0.08673;
    const z97 = 1.881;
    const sd = 1.41;

    if (sex === "Male") {
        return 42.4 + (heightCoeff * height) + (z97 * sd);
    }

    if (sex === "Female") {
        return 41.02 + (heightCoeff * height) + (z97 * sd);
    }

    return null;
}

    function checkMacrocephaly() {
        const sex = document.getElementById("sex").value;
        const height = parseFloat(document.getElementById("height").value);
        const hc = parseFloat(document.getElementById("hc").value);
        const resultDiv = document.getElementById("result");

        if (!sex || isNaN(height) || isNaN(hc)) {
            resultDiv.innerHTML = "<span class='warn'>Please complete all fields.</span>";
            return;
        }


const cutoff = calculate97thCentile(sex, height);

if (cutoff === null) {
    resultDiv.innerHTML =
        "<span class='warn'>Unable to calculate reference for this input.</span>";
    return;
}
       
if (hc >= cutoff) {
    resultDiv.innerHTML =
        `<span class='yes'>YES — Macrocephaly (≥97th centile)</span><br>
         Estimated 97th centile cutoff: <strong>${cutoff.toFixed(1)} cm</strong>`;
} else {
    resultDiv.innerHTML =
        `<span class='no'>NO — Below 97th centile</span><br>
         Estimated 97th centile cutoff: <strong>${cutoff.toFixed(1)} cm</strong>`;
}
}
</script>

</body>
</html>
